<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader No Watermark</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl p-6 text-center">
        <h1 class="text-2xl font-bold mb-2 text-pink-550 flex justify-center gap-2 items-center">
            🎵 TikTok Downloader
        </h1>
        <p class="text-gray-400 text-sm mb-6">Unduh video TikTok tanpa watermark secara gratis & cepat.</p>

        <div class="flex flex-col gap-3">
            <input type="text" id="tiktokUrl" placeholder="Tempel tautan video TikTok di sini..." 
                class="w-full px-4 py-3 rounded-xl bg-slate-700 border border-slate-650 focus:outline-none focus:ring-2 focus:ring-pink-500 text-white placeholder-gray-400">
            <button onclick="downloadVideo()" id="btnDownload"
                class="w-full py-3 bg-gradient-to-r from-pink-500 to-red-500 hover:from-pink-600 hover:to-red-600 font-semibold rounded-xl transition duration-200 shadow-lg shadow-pink-550/20">
                Ambil Video
            </button>
        </div>

        <div id="loading" class="hidden my-6 text-pink-400 font-medium animate-pulse">
            Sedang memproses video...
        </div>

        <div id="result" class="hidden mt-6 border-t border-slate-700 pt-6 animate-fade-in">
            <img id="videoCover" src="" alt="Cover" class="w-32 h-32 object-cover rounded-lg mx-auto mb-3 shadow-md">
            <h3 id="videoTitle" class="font-semibold text-sm line-clamp-2 mb-1">Judul Video</h3>
            <p id="videoAuthor" class="text-xs text-gray-400 mb-4">@username</p>
            
            <div class="flex flex-col gap-2">
                <a id="btnNoWm" href="" target="_blank" download
                    class="w-full py-2.5 bg-green-600 hover:bg-green-700 text-sm font-semibold rounded-lg transition text-center block">
                    📥 Download (Tanpa Watermark)
                </a>
                <a id="btnAudio" href="" target="_blank" download
                    class="w-full py-2.5 bg-slate-700 hover:bg-slate-600 text-sm font-semibold rounded-lg transition text-center block text-gray-200">
                    🎵 Download Audio (MP3)
                </a>
            </div>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const urlInput = document.getElementById('tiktokUrl').value.trim();
            const btnDownload = document.getElementById('btnDownload');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!urlInput) {
                alert('Tolong masukkan URL TikTok terlebih dahulu!');
                return;
            }

            // Reset & Show Loading
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            btnDownload.disabled = true;

            try {
                // Menembak serverless API kita sendiri di Vercel
                const response = await fetch(`/api/download?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('videoCover').src = data.cover;
                    document.getElementById('videoTitle').innerText = data.title || 'Video TikTok';
                    document.getElementById('videoAuthor').innerText = `Oleh: ${data.author}`;
                    
                    // Set link download
                    document.getElementById('btnNoWm').href = data.nowm_video;
                    document.getElementById('btnAudio').href = data.music;

                    result.classList.remove('hidden');
                } else {
                    alert(data.error || 'Gagal mengunduh video.');
                }
            } catch (error) {
                alert('Terjadi kesalahan koneksi ke server.');
            } finally {
                loading.classList.add('hidden');
                btnDownload.disabled = false;
            }
        }
    </script>
</body>
</html>
